name: Deploy Innovatech EP2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Subir Imágenes
        run: |
          # Construimos el Front (ajusta la ruta si tu carpeta se llama distinto)
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-front:latest ./front_despacho
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-front:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Entrar a AWS y Actualizar
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker rm -f front || true
            
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-front:latest
            
            sudo docker run -d --name front --network host ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-front:latest

